<script>
const state = {
  sessionId: getStoredSessionId_(),
  data: null,
  page: normalizePageKey(requestedPageFromUrl() || 'dashboard')
};

function requestedPageFromUrl() {
  try {
    const url = new URL(window.location.href);
    return url.searchParams.get('page') || url.searchParams.get('p') || '';
  } catch (e) {
    const m = String(window.location.search || '').match(/[?&](?:page|p)=([^&]+)/);
    return m ? decodeURIComponent(m[1]) : '';
  }
}

function normalizePageKey(page) {
  page = String(page || 'dashboard').trim();
  if (!page) page = 'dashboard';
  if (page === 'htmlcode') page = 'bbcode';
  return page;
}

function scUserField_(user, keys, fallback='') {
  user = user || {};
  for (const k of keys) {
    if (user[k] !== undefined && user[k] !== null && String(user[k]).trim() !== '') return user[k];
  }
  return fallback;
}
function scNormalizeUser_(session) {
  const u = (session && session.user) || session || {};
  return {
    sessionId: session && session.sessionId || u.sessionId || '',
    tornId: String(scUserField_(u, ['tornId','Torn_ID','TornId','torn_id','player_id','Player_ID','user_id','User_ID','id','ID'], '')).trim(),
    name: String(scUserField_(u, ['name','Name','player_name','Player_Name','username','Username'], 'Member')).trim(),
    role: String(scUserField_(u, ['role','Role'], 'Member')).trim(),
    roleValue: Number(scUserField_(u, ['roleValue','Role_Value','role_value'], 1)) || 1
  };
}

// v2.6.8: Navigation/session stabilization helpers.
// The old lazy page loader could overwrite the current logged-in session with
// a public/null payload after clicking a tab. These helpers keep the browser's
// saved session and permission payload unless the user explicitly logs out.
function getStoredSessionId_() {
  try {
    return localStorage.getItem('sc_session') || sessionStorage.getItem('sc_session') || '';
  } catch (e) { return ''; }
}

function setStoredSessionId_(sessionId) {
  sessionId = String(sessionId || '').trim();
  state.sessionId = sessionId;
  try {
    if (sessionId) {
      localStorage.setItem('sc_session', sessionId);
      sessionStorage.setItem('sc_session', sessionId);
    } else {
      localStorage.removeItem('sc_session');
      sessionStorage.removeItem('sc_session');
      localStorage.removeItem('sc_session_obj');
      sessionStorage.removeItem('sc_session_obj');
    }
  } catch (e) {}
}

// v2.6.9: Keep a copy of the last known session object in browser storage.
// The lightweight page loader often returns page data without a session object;
// that must not visually log the user out during navigation.
function getStoredSessionObject_() {
  try {
    const raw = sessionStorage.getItem('sc_session_obj') || localStorage.getItem('sc_session_obj') || '';
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}
function setStoredSessionObject_(session) {
  try {
    if (session && typeof session === 'object') {
      const raw = JSON.stringify(session);
      localStorage.setItem('sc_session_obj', raw);
      sessionStorage.setItem('sc_session_obj', raw);
    }
  } catch (e) {}
}
function hasAnySessionId_() {
  return !!(state.sessionId || getStoredSessionId_());
}
function activeSession_() {
  // v2.6.10: Never let an old admin/leader session object override a newer API/member session ID.
  const sid = state.sessionId || getStoredSessionId_();
  const inMemory = state.data && state.data.session;
  if (inMemory && (!sid || !inMemory.sessionId || String(inMemory.sessionId) === String(sid))) return inMemory;
  const stored = getStoredSessionObject_();
  if (stored && (!sid || !stored.sessionId || String(stored.sessionId) === String(sid))) return stored;
  return null;
}

function clearClientAuthState_() {
  // Clears every browser-side auth fallback we have used across v2.6.x.
  try {
    localStorage.removeItem('sc_session');
    localStorage.removeItem('sc_session_obj');
    localStorage.removeItem('sc_admin_token');
    localStorage.removeItem('sc_admin_token_remember');
    localStorage.removeItem('sc_remember_admin_token');
    localStorage.removeItem('sc_leader_token');
    sessionStorage.removeItem('sc_session');
    sessionStorage.removeItem('sc_session_obj');
    sessionStorage.removeItem('sc_admin_token');
  } catch (e) {}
  try { if (String(window.name || '').indexOf('sc_session') >= 0) window.name = ''; } catch (e) {}
  try { if (String(location.hash || '').indexOf('scsid=') >= 0) history.replaceState(null, document.title, location.pathname + location.search); } catch (e) {}
  state.sessionId = '';
  if (state.data) state.data.session = null;
}

function replaceActiveSession_(sessionId, sessionObj) {
  // v2.6.10: Explicit auth-mode switch. API login replaces leader login, and leader login replaces API login.
  sessionId = String(sessionId || '').trim();
  clearClientAuthState_();
  setStoredSessionId_(sessionId);
  if (sessionObj && typeof sessionObj === 'object') {
    sessionObj.sessionId = sessionObj.sessionId || sessionId;
    setStoredSessionObject_(sessionObj);
    state.data = state.data || {};
    state.data.session = sessionObj;
  }
}


function updateLoginBadge_() {
  try {
    const el = document.getElementById('loginBadge') || document.querySelector('.login-badge');
    if (el) el.textContent = activeSession_() ? ((activeSession_().role || 'Member') + ' · ' + (activeSession_().name || 'Logged in')) : 'Not logged in';
  } catch (e) {}
}

function validateLoginSession_(session, source) {
  source = source || 'Login';
  // v2.6.16 supports either a direct session object or a wrapped {ok, session}.
  if (session && session.session && typeof session.session === 'object') session = session.session;
  if (!session || typeof session !== 'object') {
    throw new Error(source + ' failed: the server returned no session. Make sure Security.gs v2.6.19 is installed and redeployed.');
  }
  if (session.ok === false) {
    throw new Error(source + ' failed: ' + (session.error || session.message || 'Unknown server error.'));
  }
  const sid = session.sessionId || session.session_id || session.id || '';
  if (!sid) {
    const err = session.error || session.message || JSON.stringify(session).slice(0, 300);
    throw new Error(source + ' failed: missing sessionId' + (err ? ' — ' + err : '.'));
  }
  session.sessionId = String(sid);
  session.user = session.user || {};
  return session;
}

function mergeIncomingData_(incoming) {
  incoming = incoming || {};
  const previous = state.data || {};

  // v2.6.9: A page-specific payload may omit session or return null while
  // the browser still has a valid logged-in context. Never erase a known session
  // during navigation; only logout should clear it.
  const previousSession = previous.session || getStoredSessionObject_();
  if (!incoming.session && previousSession && hasAnySessionId_()) {
    incoming.session = previousSession;
  }
  if (incoming.session) setStoredSessionObject_(incoming.session);

  // Keep permissions/prefs unless the new payload has a real v25 object. Some
  // lazy page responses omit v25 for speed; losing it hides/denies pages.
  if ((!incoming.v25 || typeof incoming.v25 !== 'object' || Object.keys(incoming.v25).length === 0) && previous.v25) {
    incoming.v25 = previous.v25;
  }

  // Preserve public info/theme if a page-specific response omits it.
  if ((!incoming.public || typeof incoming.public !== 'object' || Object.keys(incoming.public).length === 0) && previous.public) {
    incoming.public = previous.public;
  }

  state.data = Object.assign({}, previous, incoming);
  if (state.data && state.data.session) setStoredSessionObject_(state.data.session);
  if (hasAnySessionId_()) state.sessionId = state.sessionId || getStoredSessionId_();
  return state.data;
}

document.addEventListener('DOMContentLoaded', () => {
  // v2.6.2: direct handlers plus delegated fallback, so nav keeps working even
  // if buttons are moved/filtered by layout permissions.
  document.querySelectorAll('.nav').forEach(btn => btn.addEventListener('click', (ev) => { ev.preventDefault(); showPage(btn.dataset.page, true); }));
  document.addEventListener('click', (ev) => {
    const btn = ev.target && ev.target.closest ? ev.target.closest('.nav[data-page]') : null;
    if (!btn) return;
    ev.preventDefault();
    showPage(btn.dataset.page, true);
  });
  document.getElementById('refreshBtn').addEventListener('click', loadState);
  document.getElementById('connectBtn').addEventListener('click', connectKey);
  document.getElementById('leaderLoginBtn').addEventListener('click', leaderLogin);
  const memberTokenBtn = document.getElementById('memberTokenLoginBtn');
  if (memberTokenBtn) memberTokenBtn.addEventListener('click', memberTokenLogin);
  loadState();
});

function gas(fn, ...args) {
  return new Promise((resolve, reject) => {
    google.script.run.withSuccessHandler(resolve).withFailureHandler(err => reject(err))[fn](...args);
  });
}

function toast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('hidden');
  el.style.borderColor = isError ? '#ef4444' : '#374151';
  setTimeout(() => el.classList.add('hidden'), 5000);
}

async function loadState() {
  try {
    state.sessionId = state.sessionId || getStoredSessionId_();
    const urlPage = requestedPageFromUrl();
    if (urlPage) state.page = normalizePageKey(urlPage);
    const page = normalizePageKey(state.page || 'dashboard');
    const data = await gas('getPageStateV26', state.sessionId, page);
    mergeIncomingData_(data);
    const pub = state.data.public || {};
    document.getElementById('apiDisclosure').textContent = pub.apiDisclosure || '';
    renderAll();
    await showPage(page, false);
  } catch (err) {
    toast(err.message || String(err), true);
    renderPerfFailSafe(err);
  }
}

async function showPage(page, pushUrl=false) {
  state.sessionId = state.sessionId || getStoredSessionId_();
  page = normalizePageKey(page);

  // v2.6.2: Do NOT silently redirect denied/private pages to Dashboard.
  // Keep the clicked page active and let renderCurrentPageV26 show either
  // Login Required or Access Denied. This fixes nav clicks always loading Dashboard.
  state.page = page;

  document.querySelectorAll('.nav').forEach(b => b.classList.toggle('active', normalizePageKey(b.dataset.page) === page));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === page));
  document.getElementById('pageTitle').textContent = pageTitle(page);

  if (pushUrl) {
    const url = new URL(location.href);
    url.searchParams.set('page', page);
    history.replaceState(null, '', url.toString());
  }

  await loadPageDataV26(page);
}

async function loadPageDataV26(page) {
  state.sessionId = state.sessionId || getStoredSessionId_();
  const el = byId(page);
  if (!el) return;
  el.innerHTML = '<div class="card"><h3>Loading '+esc(pageTitle(page))+'</h3><p class="muted">Loading only this page to keep ShadowCore HQ responsive...</p></div>';
  try {
    const data = await gas('getPageStateV26', state.sessionId, page);
    mergeIncomingData_(data);
    renderAll();
  } catch (err) {
    // v2.6.9: If the server refuses/forgets the session during a lazy page load,
    // do not kick the user out. Render with already-loaded data and let action
    // buttons validate server-side when clicked.
    if (activeSession_()) {
      renderAll();
      toast('Page loaded from local session fallback. Some live data may need Refresh.', false);
      return;
    }
    el.innerHTML = `<div class="card"><h3>Page failed to load</h3><p class="warnbox">${esc(err.message || String(err))}</p><button onclick="loadPageDataV26(state.page)">Retry this page</button><button class="secondary" onclick="showPage('dashboard',true)">Back to Dashboard</button></div>`;
    toast(err.message || String(err), true);
  }
}

function renderPerfFailSafe(err) {
  const el = byId('dashboard');
  if (!el) return;
  el.innerHTML = `<div class="card"><h3>ShadowCore HQ Safe Boot</h3><p class="warnbox">The full site did not load. This usually means the sheet is overloaded or a page is reading too much data.</p><p>${esc(err && (err.message || String(err)) || '')}</p><div class="actions"><button onclick="loadState()">Retry</button><button onclick="showPage('diagnostics',true)">Diagnostics</button><button onclick="showPage('safemode',true)">Safe Mode</button></div></div>`;
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'dashboard'));
}

function pageTitle(page) {
  return {
    layout:'My Layout', permissions:'Page Permissions', dashboard:'Dashboard', war:'War Room', battleplan:'Battle Plan', commitments:'War Contracts', strike:'Strike Teams', chain:'Chain Tracker', targets:'Target Board',
    payouts:'Payout Center', requests:'Armory Requests', recruiting:'Recruiting', vetting:'Applicant Vetting', training:'Training',
    scorecards:'Member Scorecards', oc:'OC Planner', enemy:'Enemy Intel', chainplan:'Chain Planner', economy:'Economy Ledger', discipline:'Discipline', tasks:'Officer Tasks', rulescheck:'Rule Checks', bbcode:'HTML Code Editor', htmlcode:'HTML Code Editor', selfservice:'Self-Service', mobile:'Mobile War',
    treasury:'Treasury', loans:'Loans', revives:'Revive Support', availabilitycal:'Availability Calendar', promotions:'Promotions', awards:'Awards', onboarding:'Onboarding', mentors:'Mentors', knowledge:'Knowledge Base', keyhealth:'API Key Health', polls:'Polls', mylife:'My Faction Life', advisor:'Advisor Center', myadvisor:'My Advisor', membereducation:'Member Education', weeklyreport:'Weekly Reports', coachingqueue:'Coaching Queue', factionneeds:'Faction Needs', microsite:'Recruitment Microsite',
    setup:'Setup Wizard', privacy:'Privacy / API Disclosure', updates:'Version / Updates', backups:'Backups', diagnostics:'Diagnostics', scannerinstall:'Scanner Install', gymgains:'Gym Gains Lab', GymGainComparison:'Gym Comparison', GymGainProjectionView:'Gym Projection', GymGoalEstimatorView:'Goal Estimator', warcountdown:'105h Enemy Watch', MemberActivityTable:'Member Activity Table', ActivityHeatmap:'Activity Heatmap', WarReadinessReportView:'War Readiness Report', scannerdeep:'Scanner Deep Data', visuals:'Graphs / Visuals', scanneroptin:'Scanner Opt-In', recommendations:'Smart Recommendations', taborganizer:'Tab Organizer', tokens:'Member Tokens', commands:'Discord Commands', protection:'Sheet Protection', safemode:'Safe Mode', manual:'Admin Manual', theme:'Theme',
    comms:'Comms & Reports', settings:'Settings', admin:'Admin'
  }[page] || page;
}

async function connectKey() {
  try {
    // v2.6.19: API login is an auth-mode switch. Clear any old admin/leader state
    // BEFORE connecting so a failed API attempt cannot visually fall back to admin.
    clearClientAuthState_();
    updateLoginBadge_ && updateLoginBadge_();
    const key = document.getElementById('apiKeyInput').value;
    const consent = {
      accepted: document.getElementById('consentInput').checked,
      discord: document.getElementById('discordInput').value,
      selections: document.getElementById('selectionsInput').value,
      accessLevel: 'Custom/Member'
    };
    const session = validateLoginSession_(await gas('sc2619ConnectApiKey', key, consent), 'API login');
    const baseUser = scNormalizeUser_(session);
    const sessionObj = Object.assign(baseUser, {
      sessionId: session.sessionId,
      apiLogin: true,
      adminToken: false,
      authMode: 'API'
    });
    replaceActiveSession_(session.sessionId, sessionObj);
    const autoSync = session.autoMemberApiSync || {};
    if (autoSync && autoSync.ok) {
      toast('Connected as ' + (session.user && session.user.name ? session.user.name : 'member') + '. Auto sync is active.');
    } else if (autoSync && autoSync.error) {
      toast('Connected, but auto sync could not run yet: ' + autoSync.error, true);
    } else {
      toast('Connected as ' + (session.user && session.user.name ? session.user.name : 'member'));
    }
    await loadState();
  } catch (err) { toast(err.message || String(err), true); }
}

async function leaderLogin() {
  try {
    const token = document.getElementById('leaderTokenInput').value;
    const session = validateLoginSession_(await gas('sc2619LeaderLogin', token), 'Leader token login');
    replaceActiveSession_(session.sessionId, {
      sessionId: session.sessionId,
      tornId: 'LEADER',
      name: (session.user && session.user.name) || 'Leader',
      role: 'Admin',
      roleValue: 99,
      adminToken: true,
      apiLogin: false,
      authMode: 'ADMIN'
    });
    toast('Leader login successful.');
    await loadState();
  } catch (err) { toast(err.message || String(err), true); }
}

async function memberTokenLogin() {
  try {
    const token = document.getElementById('memberTokenInput').value;
    const session = validateLoginSession_(await gas('memberTokenLogin', token), 'Member token login');
    const baseUser = scNormalizeUser_(session);
    replaceActiveSession_(session.sessionId, Object.assign(baseUser, {
      sessionId: session.sessionId,
      memberTokenLogin: true,
      adminToken: false
    }));
    toast('Token login successful.');
    await loadState();
  } catch (err) { toast(err.message || String(err), true); }
}


function debugSessionV268() {
  return {
    stateSessionId: state.sessionId,
    storedSessionId: getStoredSessionId_(),
    hasSession: !!activeSession_(),
    session: activeSession_(),
    storedSessionObj: getStoredSessionObject_(),
    page: state.page,
    hasV25: !!(state.data && state.data.v25),
    allowedPages: state.data && state.data.v25 ? state.data.v25.allowedPages : null
  };
}
window.debugSessionV268 = debugSessionV268;
window.clearShadowCoreLoginV2610 = function(){ clearClientAuthState_(); location.reload(); };

async function debugMyDataV2612() {
  try {
    const sid = state.sessionId || getStoredSessionId_();
    const res = await gas('debugMyDataDirectV2612', sid);
    console.log('ShadowCore v2.6.12 My Data Debug', res);
    alert(JSON.stringify(res, null, 2).slice(0, 3500));
  } catch (err) {
    console.error(err);
    alert(err.message || String(err));

}
window.debugMyDataV2612 = debugMyDataV2612;

function renderAll() {
  const d = state.data || {};
  const session = d.session || getStoredSessionObject_();
  if (session && !d.session) {
    state.data = state.data || {};
    state.data.session = session;
  }
  document.getElementById('sessionBadge').textContent = session ? `${session.name} · ${session.role}` : 'Not logged in';
  document.getElementById('loginPanel').style.display = session ? 'none' : 'block';
  applyV25Visibility();
  renderCurrentPageV26();
}

function renderCurrentPageV26() {
  const page = state.page || 'dashboard';
  const map = {
    dashboard: renderDashboard, war: renderWar, battleplan: renderV12BattlePlan, commitments: renderV12Commitments, strike: renderV12StrikeTeams,
    chain: renderChain, targets: renderTargets, payouts: renderPayouts, requests: renderRequests, recruiting: renderRecruiting, vetting: renderV12Vetting,
    training: renderV12Training, scorecards: renderScorecards, oc: renderOC, enemy: renderEnemy, chainplan: renderV12ChainPlan, economy: renderV12Economy,
    discipline: renderV12Discipline, tasks: renderV12Tasks, rulescheck: renderV12RuleChecks, bbcode: renderV12HtmlCodeEditor, htmlcode: renderV12HtmlCodeEditor,
    selfservice: renderV12SelfService, mobile: renderV12Mobile, treasury: renderV13Treasury, loans: renderV13Loans, revives: renderV13Revives,
    availabilitycal: renderV13AvailabilityCalendar, promotions: renderV13Promotions, awards: renderV13Awards, onboarding: renderV13Onboarding, mentors: renderV13Mentors,
    knowledge: renderV13Knowledge, keyhealth: renderV13KeyHealth, polls: renderV13Polls, mylife: renderV13MyLife, layout: renderV25Layout, permissions: renderV25Permissions,
    advisor: renderV24Advisor, myadvisor: renderV24MyAdvisor, membereducation: renderV24MemberEducation, weeklyreport: renderV24WeeklyReport, coachingqueue: renderV24CoachingQueue, factionneeds: renderV24FactionNeeds,
    microsite: renderV13Microsite, setup: renderV16Setup, privacy: renderV16Privacy, updates: renderV16Updates, backups: renderV16Backups, diagnostics: renderV16Diagnostics, scannerinstall: renderV16ScannerInstall,
    gymgains: renderV20GymGains, GymGainComparison: renderV20GymComparison, GymGainProjectionView: renderV20GymProjectionView, GymGoalEstimatorView: renderV20GymGoalEstimatorView,
    warcountdown: renderV19WarCountdown, MemberActivityTable: renderV19MemberActivityTable, ActivityHeatmap: renderV19ActivityHeatmap, WarReadinessReportView: renderV19WarReadinessReportView,
    scannerdeep: renderV18ScannerDeep, visuals: renderV18Visuals, scanneroptin: renderV18ScannerOptIn, recommendations: renderV18Recommendations, taborganizer: renderV18TabOrganizer,
    tokens: renderV16Tokens, commands: renderV16Commands, protection: renderV16Protection, safemode: renderV16SafeMode, manual: renderV16Manual, theme: renderV16Theme,
    comms: renderComms, settings: renderSettings, admin: renderAdmin
  };
  const fn = map[page] || renderDashboard;
  const publicPages = new Set(['dashboard','microsite','recruiting','privacy']);

  // v2.6.2: route is allowed to load, but page content may require login/role.
  // Show the message inside the clicked page instead of sending users to Dashboard.
  if (!activeSession_() && !publicPages.has(page)) {
    const el = byId(page) || byId('dashboard');
    if (el) el.innerHTML = '<div class="card"><h3>Login required</h3><p class="muted">This page is private. Your browser did not have a valid session for this page. Log in again, then try this tab. If this repeats, clear browser site data and redeploy v2.6.9.</p></div>';
    return;
  }
  if (activeSession_() && !v25CanView(page)) {
    const el = byId(page) || byId('dashboard');
    if (el) el.innerHTML = '<div class="card"><h3>Access denied</h3><p class="muted">Your current role is not allowed to view this area. Leaders can change this under Page Permissions.</p></div>';
    return;
  }

  try { fn(); } catch (err) {
    const el = byId(page) || byId('dashboard');
    if (el) el.innerHTML = '<div class="card"><h3>Render error</h3><p class="warnbox">'+esc(err.message || String(err))+'</p><button onclick="loadPageDataV26(state.page)">Retry this page</button></div>';
    console.error(err);
  }
}


function v25(){ return (state.data && state.data.v25) || {}; }
function v25Prefs(){ return v25().preferences || {}; }
function v25HasPermissionPayload(){ return !!(state.data && state.data.v25 && Array.isArray(state.data.v25.allowedPages)); }
function v25IsAdminSession(){
  const s = activeSession_();
  if (!s) return false;
  const role = String(s.role || '').toUpperCase();
  return Number(s.roleValue || 0) >= 5 || role === 'LEADER' || role === 'DEVELOPER' || role === 'ADMIN';
}
function v25CriticalAdminPages(){
  return new Set(['permissions','layout','settings','admin','diagnostics','setup','safemode','backups','updates','tokens','protection','manual','theme']);
}
function v25AllowedPages(){
  const base = ['dashboard','microsite','recruiting','privacy'];
  const allNav = Array.from(document.querySelectorAll('.nav')).map(b => normalizePageKey(b.dataset.page)).filter(Boolean);
  if (v25IsAdminSession()) return new Set(base.concat(allNav).concat(Array.from(v25CriticalAdminPages())));
  if (!v25HasPermissionPayload()) return new Set(base.concat(allNav));
  return new Set((v25().allowedPages || []).map(normalizePageKey).concat(base));
}
function v25CanView(page){
  page = normalizePageKey(page);
  // Admin-token / Leader sessions must never be locked out of the permissions tools.
  if (v25IsAdminSession()) return true;
  // Do not force direct links back to dashboard while permissions are still loading,
  // and do not let missing v25 sheets break page routing. Backend still controls data.
  if (!v25HasPermissionPayload()) return true;
  if (!activeSession_()) return ['dashboard','microsite','recruiting','privacy'].includes(page);
  return v25AllowedPages().has(page);
}
function v25DefaultPage(){
  const pref = v25Prefs();
  const preferred = normalizePageKey(pref.Default_Page || (v25().defaultPage) || 'dashboard');
  if (v25CanView(preferred)) return preferred;
  if (v25CanView('mylife')) return 'mylife';
  return 'dashboard';
}
function applyV25Visibility(){
  const allowed = v25AllowedPages();
  document.querySelectorAll('.nav').forEach(btn => {
    const page = normalizePageKey(btn.dataset.page);
    const show = allowed.has(page);
    btn.classList.toggle('hidden-by-v25', !show);
  });
  document.querySelectorAll('[data-v25-section]').forEach(el => {
    const key = el.dataset.v25Section;
    const collapsed = v25CsvSet(v25Prefs().Collapsed_Sections)[key];
    el.classList.toggle('v25-collapsed', !!collapsed);
  });
}
function v25CsvSet(csv){ const out={}; String(csv||'').split(',').map(x=>x.trim()).filter(Boolean).forEach(x=>out[x]=true); return out; }
function v25SetToCsv(obj){ return Object.keys(obj).filter(k=>obj[k]).join(','); }
function v25Groups(){
  const pages = v25().pages || [];
  const grouped = {};
  pages.forEach(p => { (grouped[p.Category||'Other'] ||= []).push(p); });
  return grouped;
}

function renderDashboard() {
  const d = state.data || {}, s = d.dashboard || {}, announcements = d.announcements || [];
  const events = (d.events || []).slice(-5).reverse();
  byId('dashboard').innerHTML = `
    <div class="grid four">
      ${kpi('Members', s.members ?? 0)}
      ${kpi('Available', s.available ?? 0, 'status-ok')}
      ${kpi('Hospital', s.hospitalized ?? 0, 'status-bad')}
      ${kpi('Unpaid payouts', money(s.unpaidPayouts ?? 0))}
    </div>

function updateHtmlEditorPreview(){
  const editor = byId('htmlEditor');
  const frame = byId('htmlPreviewFrame');
  if (!editor || !frame) return;
  const doc = frame.contentDocument || frame.contentWindow?.document;
  if (!doc) return;
  doc.open();
  doc.write(`<!doctype html><html><head><base target="_blank"><style>body{font-family:Arial,sans-serif;background:#0b0f14;color:#e5e7eb;padding:16px;line-height:1.45}a{color:#f59e0b}table{border-collapse:collapse;width:100%}td,th{border:1px solid #374151;padding:6px}pre{white-space:pre-wrap;background:#111827;padding:10px;border-radius:8px}</style></head><body>${editor.value || ''}</body></html>`);
  doc.close();
}

async function copyHtmlEditorCode(){
  const text = val('htmlEditor');
  try { await navigator.clipboard.writeText(text); toast('HTML copied.'); }
  catch(err){ console.log(text); toast('Clipboard blocked. HTML printed in console.', true); }
}

async function copyHtmlEditorPlain(){
  const text = val('htmlPlain') || stripHtmlClient_(val('htmlEditor'));
  try { await navigator.clipboard.writeText(text); toast('Plain text copied.'); }
  catch(err){ console.log(text); toast('Clipboard blocked. Plain text printed in console.', true); }
}

function stripHtmlClient_(html){
  const div = document.createElement('div');
  div.innerHTML = html || '';
  return div.textContent || div.innerText || '';
}

function kpi(label,value,cls=''){return `<div class="kpi"><span>${esc(label)}</span><b class="${cls}">${esc(value)}</b></div>`;}
function table(rows, cols){rows=rows||[];if(!rows.length)return '<p class="muted">No rows yet.</p>';cols=cols||Object.keys(rows[0]);return `<div style="overflow:auto;max-height:520px"><table><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(formatCell(r[c], c))}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;}
function renderObject(obj){if(!obj||!Object.keys(obj).length)return '<p class="muted">No data yet.</p>';return `<table><tbody>${Object.keys(obj).map(k=>`<tr><th>${esc(k)}</th><td>${esc(formatCell(obj[k], k))}</td></tr>`).join('')}</tbody></table>`;}
function formatCell(v,key=''){if(v===null||v===undefined)return '';if(typeof v==='object')return JSON.stringify(v);const k=String(key||'').toLowerCase();if(/timestamp|updated|date|time|until|last_polled|next_poll|estimate|generated/.test(k)){const t=formatLocalTime12(v);if(t)return t;}if(typeof v==='number'&&Math.abs(v)>10000)return String(v);return String(v);}
function formatLocalTime12(v){if(v===null||v===undefined||v==='')return '';let d=null;if(typeof v==='number'&&v>1000000000){d=new Date(v*(v>9999999999?1:1000));}else{const s=String(v).trim();if(/^\d+$/.test(s)&&Number(s)>1000000000)d=new Date(Number(s)*(Number(s)>9999999999?1:1000));else if(/T|GMT|UTC|\d{4}-\d{2}-\d{2}/.test(s))d=new Date(s);}if(!d||isNaN(d.getTime()))return '';return d.toLocaleString(undefined,{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',hour12:true});}

function timezoneOptions(selected){const zones=(v22().timezones||['America/New_York','America/Chicago','America/Denver','America/Los_Angeles','UTC','Europe/London','Europe/Paris','Asia/Tokyo','Australia/Sydney']);return zones.map(z=>`<option value="${esc(z)}" ${String(z)===String(selected)?'selected':''}>${esc(z)}</option>`).join('');}
function viewerTimezone(){return Intl.DateTimeFormat().resolvedOptions().timeZone || 'America/New_York';}
function localOffsetNote(tz){try{const now=new Date();const local=new Intl.DateTimeFormat('en-US',{timeZone:tz,timeZoneName:'shortOffset'}).formatToParts(now).find(p=>p.type==='timeZoneName')?.value||'';return local;}catch(e){return '';}}
function money(n){return '$'+Number(n||0).toLocaleString();}
function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}

function groupCounts(rows, field){const out={}; (rows||[]).forEach(r=>{const k=r[field]||'Other'; out[k]=(out[k]||0)+1;}); return out;}
function chartBars(obj, label, compact=false){const entries=Object.entries(obj||{}).filter(([k,v])=>Number(v)>0).sort((a,b)=>Number(b[1])-Number(a[1])).slice(0, compact?12:20); if(!entries.length) return '<p class="muted">No chart data yet.</p>'; const max=Math.max(...entries.map(e=>Number(e[1])||0),1); return `<div class="bar-chart" aria-label="${esc(label||'chart')}">${entries.map(([k,v])=>{const pct=Math.max(4,Math.round((Number(v)||0)/max*100)); return `<div class="bar-row"><span class="bar-label" title="${esc(k)}">${esc(k)}</span><span class="bar-track"><span class="bar-fill" style="width:${pct}%"></span></span><b>${esc(v)}</b></div>`;}).join('')}</div>`;}

function renderAdvisorScore(score){if(!score||!Object.keys(score).length)return '<p class="muted">No score generated yet.</p>';return `<div class="advisor-score ${scoreClass(score.Informed_Score)}"><b>${esc(score.Informed_Score||'—')}</b><span>Informed Score</span></div><p><b>Top gap:</b> ${esc(score.Top_Gap||'None')}</p><p>${esc(score.Explanation||'')}</p>`;}

function renderV25Layout(){
  const root = byId('layout'); if(!root) return;
  const v = v25(), pref = v25Prefs(), hidden = v25CsvSet(pref.Hidden_Pages), collapsed = v25CsvSet(pref.Collapsed_Sections);
  const pages = v.pages || [], presets = v.presets || [], allowed = v25AllowedPages();
  const groups = v25Groups();
  const groupHtml = Object.keys(groups).sort().map(cat => `
    <div class="card compact-card">
      <h3>${esc(cat)}</h3>
      ${(groups[cat]||[]).map(p => {
        const can = allowed.has(p.Page_Key) || !hidden[p.Page_Key];
        const isHidden = !!hidden[p.Page_Key];
        return `<label class="check v25-page-row"><input type="checkbox" ${!isHidden?'checked':''} onchange="v25ToggleHiddenPage('${esc(p.Page_Key)}', this.checked)"> ${esc(p.Label)} <small>${esc(p.Page_Key)}</small></label>`;
      }).join('')}
    </div>`).join('');
  const cards = ['status','assignment','warReadiness','payouts','support','chain','advisor','training','gym','onboarding','scanner','knowledge','awards','mentor','visuals','economy','applications','risks'];
  root.innerHTML = `
    <div class="grid two">
      <div class="card">
        <h3>My website layout</h3>
        <p class="muted">Hide pages from your own menu, choose a default landing page, and collapse noisy sections. Leaders can still control what roles are allowed to access.</p>
        <label>Default page</label>
        <select id="v25DefaultPage">${pages.map(p=>`<option value="${esc(p.Page_Key)}" ${String(pref.Default_Page||'dashboard')===p.Page_Key?'selected':''}>${esc(p.Label)}</option>`).join('')}</select>
        <label>Homepage cards, comma-separated</label>
        <input id="v25HomeCards" value="${esc(pref.Homepage_Cards||'')}" placeholder="assignment,warReadiness,payouts,support,training">
        <button onclick="v25SaveLayoutPrefs()">Save layout</button>
        <button class="secondary" onclick="v25ResetLayout()">Reset my layout</button>
      </div>
      <div class="card">
        <h3>Layout presets</h3>
        <p class="muted">Apply a preset, then tweak your hidden pages below.</p>
        <select id="v25Preset">${presets.map(p=>`<option>${esc(p.Preset_Name)}</option>`).join('')}</select>
        <button onclick="v25ApplyPreset()">Apply preset</button>
        ${table(presets, ['Preset_Name','Description','Role_Target'])}
      </div>
    </div>
    <div class="card"><h3>Collapsible page sections</h3><p class="muted">These keys are used by newer cards and dashboards. More sections can be added as pages are upgraded.</p>${cards.map(c=>`<label class="check"><input type="checkbox" ${collapsed[c]?'checked':''} onchange="v25ToggleCollapsed('${c}', this.checked)"> Collapse ${esc(c)}</label>`).join('')}</div>
    <div class="card"><h3>Hide/show pages in my menu</h3><div class="grid three">${groupHtml}</div></div>`;
}
function renderV25Permissions(){
  const root = byId('permissions'); if(!root) return;
  const v = v25(), rows = v.rolePermissions || [];
  const isLeader = v25IsAdminSession();
  root.innerHTML = `
    <div class="card"><h3>Role-based page visibility</h3><p class="muted">This hides pages from users below the selected role. It is a website navigation/access layer; sensitive sheet access is still controlled by Apps Script session role and backend functions.</p>${isLeader?'<button onclick="v25SeedPermissions()">Repair/seed permissions</button>':'<p class="muted">Leader access required to edit permissions.</p>'}</div>
    <div class="card"><h3>Pages</h3>${v25PermissionsTable(rows, isLeader)}</div>`;
}
function v25PermissionsTable(rows, canEdit){
  const roles = ['PUBLIC','APPLICANT','MEMBER','CORE','OFFICER','LEADER','DEVELOPER'];
  if(!rows.length) return '<p class="muted">No permission rows yet. Run setupShadowCoreV25LayoutPermissions().</p>';
  return `<div class="tablewrap"><table><thead><tr><th>Page</th><th>Category</th><th>Minimum role</th><th>Enabled</th><th>Save</th></tr></thead><tbody>${rows.map(r=>{
    const id = 'perm_'+String(r.Page_Key).replace(/[^a-z0-9_]/gi,'_');
    return `<tr><td><b>${esc(r.Label||r.Page_Key)}</b><br><small>${esc(r.Page_Key)}</small></td><td>${esc(r.Category||'')}</td><td><select id="${id}_role" ${canEdit?'':'disabled'}>${roles.map(role=>`<option ${String(r.Min_Role||'MEMBER')===role?'selected':''}>${role}</option>`).join('')}</select></td><td><select id="${id}_enabled" ${canEdit?'':'disabled'}><option ${String(r.Enabled).toUpperCase()!=='FALSE'?'selected':''}>TRUE</option><option ${String(r.Enabled).toUpperCase()==='FALSE'?'selected':''}>FALSE</option></select></td><td>${canEdit?`<button onclick="v25SavePermission('${esc(r.Page_Key)}','${id}')">Save</button>`:''}</td></tr>`;
  }).join('')}</tbody></table></div>`;
}
async function v25SaveLayoutPrefs(){
  try{await gas('updateV25UserPreferences', state.sessionId, {Default_Page:val('v25DefaultPage'), Homepage_Cards:val('v25HomeCards')}); toast('Layout saved.'); await loadState();}catch(err){toast(err.message||String(err),true);}
}
async function v25ToggleHiddenPage(pageKey, visible){
  const pref = v25Prefs(), set = v25CsvSet(pref.Hidden_Pages);
  set[pageKey] = !visible;
  try{await gas('updateV25UserPreferences', state.sessionId, {Hidden_Pages:v25SetToCsv(set)}); toast('Menu preference saved.'); await loadState();}catch(err){toast(err.message||String(err),true);}
}
async function v25ToggleCollapsed(sectionKey, collapsed){
  const pref = v25Prefs(), set = v25CsvSet(pref.Collapsed_Sections);
  set[sectionKey] = collapsed;
  try{await gas('updateV25UserPreferences', state.sessionId, {Collapsed_Sections:v25SetToCsv(set)}); toast('Collapse preference saved.'); await loadState();}catch(err){toast(err.message||String(err),true);}
}
async function v25ApplyPreset(){
  try{await gas('applyV25LayoutPreset', state.sessionId, val('v25Preset')); toast('Preset applied.'); await loadState();}catch(err){toast(err.message||String(err),true);}
}
async function v25ResetLayout(){
  try{await gas('resetV25MyLayout', state.sessionId); toast('Layout reset.'); await loadState();}catch(err){toast(err.message||String(err),true);}
}
async function v25SavePermission(pageKey, id){
  try{await gas('saveV25RolePermission', state.sessionId, pageKey, val(id+'_role'), val(id+'_enabled')); toast('Permission saved.'); await loadState();}catch(err){toast(err.message||String(err),true);}
}
async function v25SeedPermissions(){
  try{
    if (typeof google !== 'undefined') {
      try { await gas('repairV25AdminBypassPermissions'); } catch(e) {}
    }
    await gas('setupShadowCoreV25LayoutPermissions');
    toast('v2.5 permissions repaired/seeded.');
    await loadState();
  }catch(err){toast(err.message||String(err),true);}
}

function byId(id){return document.getElementById(id);}
function val(id){const el=byId(id);return el?el.value:'';}
